<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="robots" content="noindex,nofollow"/>
<title>דגימת לוגו · מורה הנבוכים</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root{ --aubergine:#4C1D95; --teal:#0EA5BB; --tangerine:#FF6B35; --ink:#0A0A0A; --paper:#FAFAFA; --gray:#5A5A5A; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{ background:var(--paper); color:var(--ink); font-family:'Rubik',sans-serif; min-height:100vh; }
  .top{ background:var(--aubergine); color:#fff; padding:18px 20px; text-align:center; }
  .top h1{ font-weight:800; font-size:19px; } .top h1 b{ color:var(--teal); }
  .strip{ height:5px; background:var(--tangerine); }
  .wrap{ max-width:460px; margin:0 auto; padding:18px 16px 40px; }
  .note{ text-align:center; font-size:15px; color:var(--gray); font-weight:600; line-height:1.6; margin-bottom:16px; }
  video{ width:100%; display:block; border-radius:16px; background:#000; box-shadow:0 10px 30px rgba(0,0,0,.18); }
  .cap{ text-align:center; font-weight:700; font-size:15px; color:var(--aubergine); margin-top:14px; }
  .cap small{ display:block; font-weight:600; color:var(--gray); margin-top:3px; }
</style>
</head>
<body>
  <div class="top"><h1>דגימת לוגו · מורה <b>הנבוכים</b></h1></div>
  <div class="strip"></div>
  <div class="wrap">
    <p class="note">בדיקת הלוגו המתוקן — עיגול לבן בתוך הטבעת, שקוף מסביב.<br/>צפו בסרטון ואשרו שהלוגו תקין.</p>
    <video src="clips/sample-ger-teal.mp4" controls playsinline preload="metadata"></video>
    <div class="cap">דגימה: ד״ר הלל גרשוני · דיגיטל · טורקיז<small>אם הלוגו תקין — נמשיך לשאר הסרטונים</small></div>
  </div>
</body>
</html>
