<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="robots" content="noindex,nofollow"/>
<title>דשבורד בחירות · מורה הנבוכים</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root{ --aubergine:#4C1D95; --teal:#0EA5BB; --teal-deep:#0987A0; --tangerine:#FF6B35; --ink:#0A0A0A; --paper:#FAFAFA; --gray:#4A4A4A; --gray-2:#6A6A6A; --line:#E5E5E5; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{ background:var(--paper); color:var(--ink); font-family:'Rubik','Heebo',sans-serif; }
  .num{ font-family:'Plus Jakarta Sans'; direction:ltr; unicode-bidi:bidi-override; display:inline-block; }
  .top{ background:var(--aubergine); color:#fff; padding:24px 40px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
  .top h1{ font-weight:800; font-size:26px; } .top h1 .y{ color:var(--teal); }
  .top .who{ font-family:'Plus Jakarta Sans'; font-weight:800; }
  .strip{ background:var(--tangerine); height:5px; }
  .wrap{ max-width:1100px; margin:30px auto; padding:0 36px; }
  .tally{ display:grid; grid-template-columns:repeat(3,1fr); gap:18px; margin-bottom:30px; }
  .tcard{ background:#fff; border:2px solid var(--line); border-radius:16px; padding:22px; text-align:center; }
  .tcard .lt{ width:50px; height:50px; border-radius:12px; background:var(--teal); color:#fff; font-family:'Plus Jakarta Sans'; font-weight:800; font-size:26px; display:flex; align-items:center; justify-content:center; margin:0 auto 12px; }
  .tcard .n{ font-family:'Plus Jakarta Sans'; font-weight:800; font-size:46px; color:var(--aubergine); line-height:1; }
  .tcard .lbl{ font-size:15px; color:var(--gray-2); margin-top:6px; }
  .tcard.lead{ border-color:var(--teal); box-shadow:0 10px 30px rgba(14,165,187,.2); }
  h2{ font-size:20px; color:var(--aubergine); margin-bottom:14px; }
  table{ width:100%; border-collapse:collapse; background:#fff; border:2px solid var(--line); border-radius:14px; overflow:hidden; }
  th,td{ text-align:right; padding:14px 18px; border-bottom:1px solid var(--line); font-size:16px; }
  th{ background:var(--aubergine); color:#fff; font-weight:700; }
  tr:last-child td{ border-bottom:none; }
  .opt{ display:inline-block; min-width:34px; text-align:center; background:var(--teal); color:#fff; font-family:'Plus Jakarta Sans'; font-weight:800; padding:3px 10px; border-radius:7px; }
  .meta{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .meta .cnt{ font-weight:700; color:var(--gray); }
  .meta button{ background:var(--teal); color:#fff; border:none; font-family:'Rubik'; font-weight:700; font-size:15px; padding:10px 22px; border-radius:10px; cursor:pointer; }
  .empty{ text-align:center; color:var(--gray-2); padding:40px; font-size:17px; }
</style>
</head>
<body>
  <div class="top">
    <h1>דשבורד בחירות · מורה <span class="y">הנבוכים</span></h1>
    <span class="who">URIA.BERMAN · admin</span>
  </div>
  <div class="strip"></div>
  <div class="wrap">
    <div class="tally" id="tally"></div>
    <div class="meta"><span class="cnt" id="cnt">טוען...</span><button onclick="load()">רענון ↻</button></div>
    <h2>כל הבחירות (העדכניות למעלה)</h2>
    <table><thead><tr><th>אופציה</th><th>תאריך ושעה</th></tr></thead><tbody id="rows"></tbody></table>
    <div class="empty" id="empty" style="display:none">עדיין אין בחירות. ברגע שהלקוחה תשמור בחירה, היא תופיע כאן.</div>
  </div>
<script>
  var SB='https://opvkmbnazvzfavlkxwzo.supabase.co';
  var AK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9wdmttYm5henZ6ZmF2bGt4d3pvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MDIxNzcsImV4cCI6MjA5Mzk3ODE3N30.QdyxpMpbNOC1YhdZdTAV0z4CSEtFwtcdtUiacxD5RDI';
  function fmt(t){ var d=new Date(t); return d.toLocaleString('he-IL',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}); }
  function load(){
    fetch(SB+'/rest/v1/moreh_choices?select=choice,created_at&order=created_at.desc',{headers:{'apikey':AK,'Authorization':'Bearer '+AK}})
    .then(function(r){return r.json();})
    .then(function(d){
      var counts={A:0,B:0,C:0}; d.forEach(function(x){ if(counts[x.choice]!=null) counts[x.choice]++; });
      var max=Math.max(counts.A,counts.B,counts.C,0);
      var tally=document.getElementById('tally'); tally.innerHTML='';
      ['A','B','C'].forEach(function(o){
        var lead=(counts[o]===max&&max>0)?' lead':'';
        tally.innerHTML+='<div class="tcard'+lead+'"><div class="lt">'+o+'</div><div class="n">'+counts[o]+'</div><div class="lbl">בחירות</div></div>';
      });
      document.getElementById('cnt').textContent='סה״כ '+d.length+' בחירות';
      var rows=document.getElementById('rows'); rows.innerHTML='';
      document.getElementById('empty').style.display=d.length?'none':'block';
      d.forEach(function(x){ rows.innerHTML+='<tr><td><span class="opt">'+x.choice+'</span></td><td>'+fmt(x.created_at)+'</td></tr>'; });
    })
    .catch(function(){ document.getElementById('cnt').textContent='שגיאה בטעינה'; });
  }
  load(); setInterval(load,15000);
</script>
</body>
</html>
